name: CI

on:
  push:
  pull_request:

jobs:
  quality-and-smoke:
    runs-on: ubuntu-latest
    env:
      DASHSCOPE_API_KEY: test_dashscope_api_key
      AMAP_WEB_SERVICE_KEY: test_amap_web_service_key
      ZST_USER_LOCATION: 南京

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile check
        run: |
          python -m compileall app.py api agent rag utils model eval

      - name: Run tests
        run: |
          pytest -q

      - name: Eval smoke
        run: |
          python eval/run_eval.py --schema-only
